[build]

[http_service]
  internal_port = 9090
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  AI_API_ENABLED = "true"
  AI_API_MODEL = "deepseek-chat"
